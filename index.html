<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hooked Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5F5F5; color: #1A1A1A; }
        .hook-card { border: 1px solid rgba(0,0,0,0.05); transition: transform 0.1s ease; }
        .hook-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.03); }
        .launch-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const LaunchIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        );

        const SearchIcon = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        );

        function App() {
            const [hooks, setHooks] = useState([]);
            const [search, setSearch] = useState('');

            // Load hooks from Chrome Extension Storage
            const loadHooks = () => {
                if (typeof chrome !== "undefined" && chrome.storage) {
                    chrome.storage.local.get({ hooks: [] }, (result) => {
                        setHooks(result.hooks);
                    });
                } else {
                    // Fallback for local testing without extension
                    const localData = JSON.parse(localStorage.getItem('hooks') || '[]');
                    setHooks(localData);
                }
            };

          useEffect(() => {
                // 1. Initial Load: Get what's already saved
                loadHooks();

                // 2. Handshake A: Listen for direct background messages (The Bridge)
                if (typeof chrome !== "undefined" && chrome.runtime && chrome.runtime.onMessage) {
                    chrome.runtime.onMessage.addListener((message) => {
                        if (message.type === "NEW_HOOKS") {
                            setHooks(message.data);
                        }
                    });
                }

                // 3. Handshake B: Listen for storage changes (Back-up)
                if (typeof chrome !== "undefined" && chrome.storage) {
                    chrome.storage.onChanged.addListener((changes) => {
                        if (changes.hooks) setHooks(changes.hooks.newValue);
                    });
                }
            }, []);

            const filteredHooks = hooks.filter(h => 
                h.brand.toLowerCase().includes(search.toLowerCase()) || 
                h.url.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="min-h-screen pb-20">
                    <header className="sticky top-0 z-10 bg-[#F5F5F5]/80 backdrop-blur-md border-b border-black/5">
                        <div className="max-w-5xl mx-auto px-6 py-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <h1 className="text-xl font-semibold tracking-tight">Hooked</h1>
                            <div className="relative w-full md:w-64">
                                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"><SearchIcon /></span>
                                <input 
                                    type="text"
                                    placeholder="Search..."
                                    className="w-full bg-white border border-black/10 rounded-full py-2 pl-10 pr-4 text-sm focus:outline-none focus:border-black/20"
                                    value={search}
                                    onChange={(e) => setSearch(e.target.value)}
                                />
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-6 mt-12">
                        {filteredHooks.length === 0 ? (
                            <div className="text-center py-20 border-2 border-dashed border-black/5 rounded-3xl">
                                <p className="text-gray-400 font-medium">No hooks found. Press <kbd className="bg-white px-2 py-1 rounded border shadow-sm mx-1">Alt + S</kbd> to add one.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredHooks.map(hook => (
                                    <div key={hook.id} className="hook-card bg-white p-6 rounded-2xl flex flex-col h-full shadow-sm shadow-black/5">
                                        <div className="flex-1">
                                            <span className="text-[10px] font-bold uppercase tracking-widest text-gray-400">{hook.brand}</span>
                                            <h2 className="mt-1 text-sm text-gray-500 truncate w-full mb-8 font-normal">
                                                {new URL(hook.url).hostname}
                                            </h2>
                                        </div>
                                        <button 
                                            onClick={() => window.open(hook.url, '_blank')}
                                            className="launch-btn flex items-center justify-center gap-2 w-full py-3 bg-white border border-black/10 rounded-full text-sm font-semibold hover:bg-gray-50 transition-all"
                                        >
                                            Launch <LaunchIcon />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
